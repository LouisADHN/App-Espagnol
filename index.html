function speak(text, lang) {
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang || "es-ES"; u.rate = 0.85;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } catch (e) {}
}

// ── QUIZ (existant) ────────────────────────────────────────────────
function Quiz({ phrases, onClose }) {
  const pool = phrases;
  const makeQ = (pl) => {
    const correct = pl[Math.floor(Math.random() * pl.length)];
    const opts = [correct];
    while (opts.length < Math.min(4, pl.length)) {
      const c = pl[Math.floor(Math.random() * pl.length)];
      if (!opts.includes(c)) opts.push(c);
    }
    return { correct, opts: opts.sort(() => Math.random() - 0.5) };
  };
  const [q, setQ] = useState(() => makeQ(pool));
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const [round, setRound] = useState(1);
  const TOTAL = Math.min(8, pool.length);

  const pick = (opt) => {
    if (picked) return;
    setPicked(opt);
    if (opt.es === q.correct.es) setScore((s) => s + 1);
  };
  const next = () => {
    if (round >= TOTAL) { setRound(round + 1); return; }
    setRound((r) => r + 1); setPicked(null); setQ(makeQ(pool));
  };

  if (round > TOTAL) {
    const pct = Math.round((score / TOTAL) * 100);
    return (
      <div style={modalWrap}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 54 }}>{pct >= 75 ? "🎉" : pct >= 50 ? "👏" : "💪"}</div>
          <h2 style={{ fontFamily: "'Fraunces',serif", fontSize: 30, margin: "10px 0", color: "#2a1e12" }}>{score} / {TOTAL}</h2>
          <p style={{ color: "#a98e6b", marginBottom: 24 }}>
            {pct >= 75 ? "Excel·lent! Tu es prêt(e) pour Barcelone." : pct >= 50 ? "Molt bé ! Continue à réviser." : "Recommence pour mémoriser !"}
          </p>
          <button onClick={onClose} style={primaryBtn}>Terminer</button>
        </div>
      </div>
    );
  }

  return (
    <div style={modalWrap}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
        <span style={{ fontSize: 13, fontWeight: 700, color: "#c8772a" }}>Question {round} / {TOTAL}</span>
        <button onClick={onClose} style={{ ...iconBtn(false), width: 34, height: 34 }}>✕</button>
      </div>
      <div style={{ height: 6, background: "#f0d9b5", borderRadius: 99, marginBottom: 22, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${(round / TOTAL) * 100}%`, background: "linear-gradient(90deg,#e8843b,#d6452f)", transition: "width .3s" }} />
      </div>
      <p style={{ fontSize: 13, color: "#a98e6b", marginBottom: 6 }}>Que veut dire :</p>
      <h2 style={{ fontFamily: "'Fraunces',serif", fontSize: 30, margin: "0 0 6px", color: "#2a1e12", display: "flex", alignItems: "center", gap: 10 }}>
        {q.correct.es}
        <button onClick={() => speak(q.correct.es, "es-ES")} style={iconBtn(false)}>🔊</button>
      </h2>
      <div style={{ display: "grid", gap: 10, marginTop: 20 }}>
        {q.opts.map((o) => {
          const isCorrect = picked && o.es === q.correct.es;
          const isWrong = picked && o === picked && o.es !== q.correct.es;
          return (
            <button key={o.es} onClick={() => pick(o)} style={{
              textAlign: "left", padding: "14px 16px", borderRadius: 14, fontSize: 16, fontWeight: 600,
              cursor: picked ? "default" : "pointer",
              background: isCorrect ? "#2f9c68" : isWrong ? "#d6452f" : "#fff8ef",
              color: isCorrect || isWrong ? "#fff" : "#2a1e12",
              border: `2px solid ${isCorrect ? "#2f9c68" : isWrong ? "#d6452f" : "#f0d9b5"}`,
              transition: "all .15s",
            }}>{o.fr}</button>
          );
        })}
      </div>
      {picked && (
        <button onClick={next} style={{ ...primaryBtn, marginTop: 20, width: "100%" }}>
          {round >= TOTAL ? "Voir le résultat" : "Suivant →"}
        </button>
      )}
    </div>
  );
}

// ── NOUVEAU : JEU DE PAIRES (Memory / association) ─────────────────
function MatchGame({ phrases, onClose }) {
  // on prend jusqu'à 6 phrases, on crée 2 cartes par phrase (es + fr)
  const pickPhrases = () => {
    const shuffled = [...phrases].sort(() => Math.random() - 0.5).slice(0, 6);
    const cards = [];
    shuffled.forEach((p, i) => {
      cards.push({ id: "es" + i, pairId: i, text: p.es, lang: "es" });
      cards.push({ id: "fr" + i, pairId: i, text: p.fr, lang: "fr" });
    });
    return cards.sort(() => Math.random() - 0.5);
  };

  const [cards, setCards] = useState(pickPhrases);
  const [selected, setSelected] = useState([]); // ids sélectionnés (max 2)
  const [matched, setMatched] = useState([]); // pairIds trouvés
  const [wrong, setWrong] = useState([]); // ids en erreur (flash rouge)
  const [moves, setMoves] = useState(0);
  const [start] = useState(Date.now());
  const [elapsed, setElapsed] = useState(0);

  useEffect(() => {
    if (matched.length === 6) return;
    const t = setInterval(() => setElapsed(Math.floor((Date.now() - start) / 1000)), 500);
    return () => clearInterval(t);
  }, [matched, start]);

  const handlePick = (card) => {
    if (selected.length === 2 || selected.includes(card.id) || matched.includes(card.pairId)) return;
    if (card.lang === "es") speak(card.text, "es-ES");
    const next = [...selected, card.id];
    setSelected(next);
    if (next.length === 2) {
      setMoves((m) => m + 1);
      const [a, b] = next.map((id) => cards.find((c) => c.id === id));
      if (a.pairId === b.pairId) {
        setTimeout(() => { setMatched((m) => [...m, a.pairId]); setSelected([]); }, 450);
      } else {
        setWrong(next);
        setTimeout(() => { setWrong([]); setSelected([]); }, 800);
      }
    }
  };

  const restart = () => {
    setCards(pickPhrases()); setSelected([]); setMatched([]); setWrong([]); setMoves(0); setElapsed(0);
  };

  const done = matched.length === 6;

  return (
    <div style={modalWrap}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div>
          <h2 style={{ fontFamily: "'Fraunces',serif", fontSize: 22, color: "#7a2410", margin: 0 }}>🧩 Jeu des paires</h2>
          <p style={{ fontSize: 12, color: "#a98e6b", margin: "2px 0 0" }}>Associe l'espagnol au français</p>
        </div>
        <button onClick={onClose} style={{ ...iconBtn(false), width: 34, height: 34 }}>✕</button>
      </div>

      <div style={{ display: "flex", gap: 14, marginBottom: 16, fontSize: 13, fontWeight: 700, color: "#c8772a" }}>
        <span>⏱️ {elapsed}s</span>
        <span>🔄 {moves} essais</span>
        <span>✅ {matched.length}/6</span>
      </div>

      {done ? (
        <div style={{ textAlign: "center", padding: "20px 0" }}>
          <div style={{ fontSize: 54 }}>🎉</div>
          <h2 style={{ fontFamily: "'Fraunces',serif", fontSize: 26, color: "#2a1e12", margin: "8px 0" }}>Bravo !</h2>
          <p style={{ color: "#a98e6b", marginBottom: 20 }}>Toutes les paires trouvées en {elapsed}s et {moves} essais.</p>
          <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
            <button onClick={restart} style={primaryBtn}>↻ Rejouer</button>
            <button onClick={onClose} style={{ ...primaryBtn, background: "rgba(122,36,16,.1)", color: "#7a2410", boxShadow: "none" }}>Terminer</button>
          </div>
        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 9 }}>
          {cards.map((card) => {
            const isMatched = matched.includes(card.pairId);
            const isSel = selected.includes(card.id);
            const isWrong = wrong.includes(card.id);
            return (
              <button key={card.id} onClick={() => handlePick(card)} disabled={isMatched} style={{
                minHeight: 78, padding: "8px 6px", borderRadius: 13, cursor: isMatched ? "default" : "pointer",
                fontSize: card.text.length > 16 ? 11 : 13, fontWeight: 700, lineHeight: 1.2,
                fontFamily: card.lang === "es" ? "'Fraunces',serif" : "'Mulish',sans-serif",
                background: isMatched ? "rgba(47,156,104,.15)" : isWrong ? "#d6452f" : isSel ? "linear-gradient(135deg,#e8843b,#d6452f)" : "#fff8ef",
                color: isMatched ? "#2f9c68" : isWrong || isSel ? "#fff" : "#2a1e12",
                border: `2px solid ${isMatched ? "#2f9c68" : isWrong ? "#d6452f" : isSel ? "#d6452f" : "#f0d9b5"}`,
                opacity: isMatched ? .6 : 1, transition: "all .2s", textAlign: "center",
              }}>
                {card.lang === "es" && !isMatched && <span style={{ fontSize: 8, display: "block", opacity: .6, marginBottom: 2 }}>ES</span>}
                {isMatched ? "✓" : card.text}
              </button>
            );
          })}
        </div>
      )}
      {!done && (
        <p style={{ fontSize: 11, color: "#b08a5e", textAlign: "center", marginTop: 14 }}>
          💡 Touche une carte espagnole pour l'entendre prononcée
        </p>
      )}
    </div>
  );
}

function Stat({ label, value }) {
  return (
    <div style={{ background: "rgba(255,255,255,.65)", borderRadius: 14, padding: "10px 18px", minWidth: 90, textAlign: "center", border: "1px solid rgba(122,36,16,.1)" }}>
      <div style={{ fontFamily: "'Fraunces',serif", fontSize: 24, fontWeight: 700, color: "#d6452f" }}>{value}</div>
      <div style={{ fontSize: 11, fontWeight: 700, color: "#9a4a26", textTransform: "uppercase", letterSpacing: .5 }}>{label}</div>
    </div>
  );
}

function App() {
  const [active, setActive] = useState(CATEGORIES[0].id);
  const [learned, setLearned] = useState(() => {
    try { return JSON.parse(localStorage.getItem("bcnLearned") || "{}"); } catch (e) { return {}; }
  });
  const [quiz, setQuiz] = useState(false);
  const [match, setMatch] = useState(false);

  const saveLearned = (next) => {
    setLearned(next);
    try { localStorage.setItem("bcnLearned", JSON.stringify(next)); } catch (e) {}
  };
  const toggle = (key) => saveLearned({ ...learned, [key]: !learned[key] });

  const cat = CATEGORIES.find((c) => c.id === active);
  const allPhrases = CATEGORIES.flatMap((c) => c.phrases);
  const totalLearned = Object.values(learned).filter(Boolean).length;
  const totalPhrases = allPhrases.length;
  const progress = Math.round((totalLearned / totalPhrases) * 100);

  const today = new Date();
  const trip = new Date(today.getFullYear(), 5, 25);
  if (trip < today) trip.setFullYear(trip.getFullYear() + 1);
  const days = Math.ceil((trip - today) / 86400000);

  return (
    <div style={{ minHeight: "100vh", width: "100%", background: "radial-gradient(circle at 20% 0%, #ffe9c7 0%, #ffd9a0 40%, #f4b15c 100%)", fontFamily: "'Mulish', system-ui, sans-serif", padding: "0 0 60px" }}>
      <header style={{ textAlign: "center", padding: "44px 20px 28px" }}>
        <div style={{ fontSize: 13, letterSpacing: 3, textTransform: "uppercase", fontWeight: 800, color: "#c8431f" }}>
          Cap sur Barcelone 🇪🇸
        </div>
        <h1 style={{ fontFamily: "'Fraunces',serif", fontWeight: 700, fontSize: "clamp(30px,7vw,52px)", margin: "8px 0 4px", color: "#7a2410", lineHeight: 1 }}>
          Castellà &amp; Català
        </h1>
        <p style={{ color: "#9a4a26", fontWeight: 600, maxWidth: 440, margin: "8px auto 0" }}>
          L'espagnol est compris partout à Barcelone, et le catalan est la langue locale. Voici les deux pour ta semaine de vacances.
        </p>
        <div style={{ display: "inline-flex", gap: 14, marginTop: 22, flexWrap: "wrap", justifyContent: "center" }}>
          <Stat label="jours avant le départ" value={`J-${days}`} />
          <Stat label="phrases apprises" value={`${totalLearned}/${totalPhrases}`} />
          <Stat label="progression" value={`${progress}%`} />
        </div>
        <div style={{ maxWidth: 480, margin: "20px auto 0", height: 10, background: "rgba(122,36,16,.12)", borderRadius: 99, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${progress}%`, background: "linear-gradient(90deg,#e8843b,#d6452f)", borderRadius: 99, transition: "width .4s" }} />
        </div>
      </header>

      <nav style={{ display: "flex", gap: 10, overflowX: "auto", padding: "8px 18px 18px", maxWidth: 900, margin: "0 auto", scrollbarWidth: "none", WebkitOverflowScrolling: "touch" }}>
        {CATEGORIES.map((c, i) => {
          const on = c.id === active;
          const done = c.phrases.filter((p) => learned[p.es]).length;
          return (
            <button key={c.id} onClick={() => setActive(c.id)} style={{
              flex: "0 0 auto", padding: "10px 16px", borderRadius: 14,
              marginRight: i === CATEGORIES.length - 1 ? 18 : 0,
              border: on ? "2px solid #d6452f" : "2px solid transparent",
              background: on ? "#fff" : "rgba(255,255,255,.55)",
              cursor: "pointer", fontWeight: 700, fontSize: 14, color: "#7a2410",
              boxShadow: on ? "0 6px 16px rgba(214,69,47,.2)" : "none",
              display: "flex", alignItems: "center", gap: 8, whiteSpace: "nowrap",
            }}>
              <span style={{ fontSize: 18 }}>{c.icon}</span>
              <span>{c.title}</span>
              <span style={{ fontSize: 11, background: "rgba(122,36,16,.1)", borderRadius: 8, padding: "2px 6px" }}>{done}/{c.phrases.length}</span>
            </button>
          );
        })}
      </nav>

      <main style={{ maxWidth: 900, margin: "0 auto", padding: "0 18px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "8px 4px 18px", flexWrap: "wrap", gap: 12 }}>
          <div>
            <h2 style={{ fontFamily: "'Fraunces',serif", fontSize: 26, color: "#7a2410", margin: 0 }}>{cat.icon} {cat.title}</h2>
            <p style={{ color: "#9a4a26", margin: "2px 0 0", fontWeight: 600 }}>{cat.sub}</p>
          </div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            <button onClick={() => setMatch(true)} style={{ ...primaryBtn, background: "linear-gradient(135deg,#3a8ee6,#2456c8)", boxShadow: "0 6px 16px rgba(36,86,200,.3)" }}>🧩 Jeu des paires</button>
            <button onClick={() => setQuiz(true)} style={primaryBtn}>🎯 Quiz</button>
          </div>
        </div>
        <div style={{ display: "grid", gap: 14, gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))" }}>
          {cat.phrases.map((p) => (
            <Flashcard key={p.es} phrase={p} learned={!!learned[p.es]} onToggle={() => toggle(p.es)} />
          ))}
        </div>
        <div style={{ marginTop: 28, padding: "18px 22px", borderRadius: 18, background: "rgba(255,255,255,.6)", border: "1px solid rgba(122,36,16,.12)", color: "#7a2410", fontWeight: 600 }}>
          💡 <strong>À Barcelone :</strong> commencer par un mot de catalan (« Bon dia », « Gràcies ») est très apprécié des locaux. Mais pas de stress : l'espagnol castillan est compris et parlé par tout le monde. Côté prononciation catalane, le « x » se dit souvent « ch », et le « ig » final comme « tch ».
        </div>
      </main>

      {quiz && (
        <div onClick={(e) => e.target === e.currentTarget && setQuiz(false)} style={{ position: "fixed", inset: 0, background: "rgba(60,20,8,.55)", display: "flex", alignItems: "center", justifyContent: "center", padding: 18, zIndex: 50, backdropFilter: "blur(4px)" }}>
          <Quiz phrases={cat.phrases} onClose={() => setQuiz(false)} />
        </div>
      )}
      {match && (
        <div onClick={(e) => e.target === e.currentTarget && setMatch(false)} style={{ position: "fixed", inset: 0, background: "rgba(60,20,8,.55)", display: "flex", alignItems: "center", justifyContent: "center", padding: 18, zIndex: 50, backdropFilter: "blur(4px)" }}>
          <MatchGame phrases={cat.phrases} onClose={() => setMatch(false)} />
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
